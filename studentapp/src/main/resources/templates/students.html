<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(
        'Students',
        ~{::content},
        '<a href=''/''>Home</a><span class=''sep''>›</span>Students'
      )}">
<body><div th:fragment="content">

  <div class="page-header">
    <div>
      <h1 class="page-title">Students</h1>
      <p class="page-count" th:text="${students.size()} + ' students found'">0 students</p>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <form th:action="@{/students}" method="get" class="search-form">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" name="q" class="search-input"
                 placeholder="Search by name or email…"
                 th:value="${searchQuery}" autocomplete="off"/>
        </div>
        <button type="submit" class="btn btn-outline btn-sm">Search</button>
        <a th:if="${searchQuery != null and !searchQuery.isBlank()}"
           href="/students" class="btn btn-outline btn-sm">✕ Clear</a>
      </form>
      <a href="/students/new" class="btn btn-accent">
        <span>➕</span> Add Student
      </a>
    </div>
  </div>

  <div th:if="${searchQuery != null and !searchQuery.isBlank()}" class="alert alert-warning">
    <span>🔍</span>
    Results for "<strong th:text="${searchQuery}"></strong>"
    — <span th:text="${students.size()}">0</span> found.
    <button class="alert-dismiss" type="button" onclick="window.location='/students'">×</button>
  </div>

  <div class="table-card">
    <div th:if="${#lists.isEmpty(students)}" class="empty-state">
      <div class="empty-icon">👤</div>
      <div class="empty-title"
           th:text="${searchQuery != null and !searchQuery.isBlank()} ? 'No students match your search' : 'No students yet'">
        No students yet
      </div>
      <p class="empty-text"
         th:if="${searchQuery == null or searchQuery.isBlank()}">
        Add your first student to get started.
      </p>
      <br/>
      <a href="/students/new" class="btn btn-accent"
         th:if="${searchQuery == null or searchQuery.isBlank()}">➕ Add Student</a>
    </div>

    <table class="data-table" th:if="${!#lists.isEmpty(students)}">
      <thead>
        <tr>
          <th>#</th>
          <th>Student</th>
          <th>Date of Birth</th>
          <th>Phone</th>
          <th>Gender</th>
          <th>Enrolled</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="s, i : ${students}">
          <td class="mono text-muted" style="font-size:12px" th:text="${i.count}">1</td>

          <td>
            <div class="student-cell">
              <div class="avatar"
                   th:classappend="${i.index % 5 == 0} ? 'avatar-green' :
                                   (${i.index % 5 == 1} ? 'avatar-blue' :
                                   (${i.index % 5 == 2} ? 'avatar-purple' :
                                   (${i.index % 5 == 3} ? 'avatar-orange' : 'avatar-pink')))"
                   th:text="${#strings.substring(s.firstName,0,1) + #strings.substring(s.lastName,0,1)}">AB</div>
              <div>
                <div class="student-name" th:text="${s.fullName}">Full Name</div>
                <div class="student-email" th:text="${s.email}">email@example.com</div>
              </div>
            </div>
          </td>

          <td class="mono" style="font-size:12.5px;color:var(--muted)"
              th:text="${s.dateOfBirth != null ? #temporals.format(s.dateOfBirth, 'dd MMM yyyy') : '—'}">—</td>

          <td class="mono" style="font-size:12.5px;color:var(--muted)"
              th:text="${s.phone != null and !s.phone.isBlank() ? s.phone : '—'}">—</td>

          <td>
            <span th:if="${s.gender != null}" class="badge badge-dept"
                  th:text="${s.gender.name()}">—</span>
            <span th:if="${s.gender == null}" class="text-muted">—</span>
          </td>

          <td>
            <span class="credit-pill"
                  th:text="${s.registrations != null ? s.registrations.size() : 0} + ' courses'">
              0 courses
            </span>
          </td>

          <td>
            <div style="display:flex;gap:6px;align-items:center">
              <a th:href="@{/students/{id}/view(id=${s.id})}"
                 class="btn btn-sm btn-outline" title="View details">👁</a>
              <a th:href="@{/students/{id}/edit(id=${s.id})}"
                 class="btn btn-sm btn-outline" title="Edit">✏️</a>
              <form th:id="'del-' + ${s.id}"
                    th:action="@{/students/{id}/delete(id=${s.id})}"
                    method="post" style="display:inline">
                <button type="button" class="btn btn-sm btn-danger" title="Delete"
                        th:onclick="'openDeleteModal(' + ${s.id} + ', \'' + ${s.fullName} + '\', \'del-' + ${s.id} + '\')'">
                  🗑
                </button>
              </form>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div></body>
</html>
