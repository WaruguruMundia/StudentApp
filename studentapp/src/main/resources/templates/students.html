<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Students | StudentApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #0d6efd; }
        .table thead { background-color: #0d6efd; color: white; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-4 py-3 mb-4">
        <span class="navbar-brand fw-bold fs-4">
            <i class="bi bi-mortarboard-fill me-2"></i>StudentApp
        </span>
</nav>

<!-- Main Content -->
<div class="container">

    <!-- Header Row -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">All Students</h4>
        <a href="/students/new" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i> Add New Student
        </a>
    </div>

    <!-- Table Card -->
    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th class="ps-4">ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Program</th>
                    <th>Year</th>
                    <th class="text-center">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(students)}">
                    <td colspan="6" class="text-center text-muted py-4">
                        No students found. Add one to get started!
                    </td>
                </tr>
                <tr th:each="student : ${students}">
                    <td class="ps-4 text-muted" th:text="${student.id}"></td>
                    <td class="fw-semibold" th:text="${student.name}"></td>
                    <td th:text="${student.email}"></td>
                    <td th:text="${student.program}"></td>
                    <td>
                                <span class="badge bg-primary-subtle text-primary border border-primary-subtle"
                                      th:text="'Year ' + ${student.year}">
                                </span>
                    </td>
                    <td class="text-center">
                        <a th:href="@{/students/edit/{id}(id=${student.id})}"
                           class="btn btn-sm btn-outline-secondary me-1">
                            <i class="bi bi-pencil"></i> Edit
                        </a>
                        <a th:href="@{/students/delete/{id}(id=${student.id})}"
                           class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Are you sure you want to delete this student?')">
                            <i class="bi bi-trash"></i> Delete
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
