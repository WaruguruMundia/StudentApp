<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(
        'Registrations',
        ~{::content},
        '<a href=''/''>Home</a><span class=''sep''>›</span>Registrations'
      )}">
<body><div th:fragment="content">

  <div class="page-header">
    <div>
      <h1 class="page-title">Registrations</h1>
      <p class="page-count" th:text="${registrations.size()} + ' total registrations'">0 registrations</p>
    </div>
    <a href="/registrations/new" class="btn btn-accent">
      <span>➕</span> New Registration
    </a>
  </div>

  <div class="table-card">

    <div th:if="${#lists.isEmpty(registrations)}" class="empty-state">
      <div class="empty-icon">📋</div>
      <div class="empty-title">No registrations yet</div>
      <p class="empty-text">Enrol students into courses to get started.</p>
      <br/>
      <a href="/registrations/new" class="btn btn-accent">➕ New Registration</a>
    </div>

    <table class="data-table" th:if="${!#lists.isEmpty(registrations)}">
      <thead>
        <tr>
          <th>#</th>
          <th>Student</th>
          <th>Course</th>
          <th>Registered</th>
          <th>Status</th>
          <th>Grade</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="reg, i : ${registrations}">
          <td class="mono text-muted" style="font-size:12px" th:text="${i.count}">1</td>

          <td>
            <div class="student-cell">
              <div class="avatar avatar-blue"
                   th:text="${#strings.substring(reg.student.firstName,0,1) + #strings.substring(reg.student.lastName,0,1)}">AB</div>
              <div>
                <div class="student-name" th:text="${reg.student.fullName}">Full Name</div>
                <div class="student-email" th:text="${reg.student.email}">email@example.com</div>
              </div>
            </div>
          </td>

          <td>
            <span class="code-pill" style="margin-bottom:3px;display:inline-block"
                  th:text="${reg.course.code}">CS101</span>
            <div class="fw-600" style="font-size:13px;margin-top:3px"
                 th:text="${reg.course.name}">Course Name</div>
          </td>

          <td class="mono text-muted" style="font-size:12px"
              th:text="${#temporals.format(reg.registrationDate, 'dd MMM yyyy')}">01 Jan 2024</td>

          <td>
            <span class="badge"
                  th:classappend="${reg.status.name() == 'ACTIVE'} ? 'badge-active' :
                                  (${reg.status.name() == 'COMPLETED'} ? 'badge-completed' :
                                  (${reg.status.name() == 'DROPPED'} ? 'badge-dropped' : 'badge-pending'))"
                  th:text="${reg.status}">ACTIVE</span>
          </td>

          <td>
            <span th:if="${reg.grade != null}" class="badge"
                  th:classappend="${reg.letterGrade == 'A'} ? 'badge-grade-a' :
                                  (${reg.letterGrade == 'B'} ? 'badge-grade-b' :
                                  (${reg.letterGrade == 'C'} ? 'badge-grade-c' :
                                  (${reg.letterGrade == 'D'} ? 'badge-grade-d' : 'badge-grade-f')))"
                  th:text="${reg.grade + '% · ' + reg.letterGrade}">90% · A</span>
            <span th:if="${reg.grade == null}" class="text-muted" style="font-size:12px">Not graded</span>
          </td>

          <td>
            <div style="display:flex;gap:6px;align-items:center">
              <!-- Edit — route: GET /registrations/{id}/edit -->
              <a th:href="@{/registrations/{id}/edit(id=${reg.id})}"
                 class="btn btn-sm btn-outline" title="Edit registration">✏️</a>

              <!-- Delete — route: POST /registrations/{id}/delete -->
              <form th:id="'del-r-' + ${reg.id}"
                    th:action="@{/registrations/{id}/delete(id=${reg.id})}"
                    method="post" style="display:inline">
                <button type="button" class="btn btn-sm btn-danger" title="Remove registration"
                        th:onclick="'openDeleteModal(' + ${reg.id} + ', \'' + ${reg.student.fullName} + ' → ' + ${reg.course.code} + '\', \'del-r-' + ${reg.id} + '\')'">
                  🗑
                </button>
              </form>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div></body>
</html>
